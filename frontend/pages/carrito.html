<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameCore — Carrito</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/carrito.css">
</head>
<body>

<!-- ══ NAVBAR ════════════════════════════════════════════════ -->
<nav class="gc-navbar">
  <a href="productos.html" class="gc-navbar__brand">
    <div class="gc-navbar__logo">🎮</div>
    <span class="gc-navbar__name">GameCore</span>
  </a>

  <div class="gc-navbar__links">
    <a href="productos.html" class="gc-navbar__link">Tienda</a>
    <a href="carrito.html"   class="gc-navbar__link active">Carrito</a>
    <a href="compras.html"   class="gc-navbar__link">Mis compras</a>
    <a href="perfil.html"    class="gc-navbar__link">Perfil</a>
  </div>

  <div id="nav-admin-links">
    <a href="dashboard.html" class="gc-navbar__link" style="color:var(--gc-amber);">
      ⚙️ Admin
    </a>
  </div>

  <div class="gc-navbar__spacer"></div>

  <div class="gc-navbar__right">
    <span class="gc-navbar__user">Hola, <span id="nav-user-name">...</span></span>
    <a href="carrito.html" class="gc-btn-carrito">
      🛒 Carrito
      <span id="carrito-badge">0</span>
    </a>
    <button class="gc-btn-logout-nav" id="btn-logout">Salir</button>
  </div>
</nav>

<!-- ══ CARRITO ═══════════════════════════════════════════════ -->
<div class="gc-carrito-wrap">

  <!-- Columna izquierda: lista de ítems -->
  <div>
    <div class="gc-section-header">
      <h1 class="gc-page-title" style="margin-bottom:0;">🛒 Mi carrito</h1>
    </div>

    <!-- Skeleton -->
    <div id="skeleton-carrito">
      <div class="skeleton-item">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line" style="width:60%"></div>
          <div class="skeleton-line" style="width:35%"></div>
        </div>
      </div>
      <div class="skeleton-item">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line" style="width:70%"></div>
          <div class="skeleton-line" style="width:40%"></div>
        </div>
      </div>
    </div>

    <!-- Ítems (los genera carrito.page.js) -->
    <div id="contenedor-carrito">
      <div id="lista-items-carrito"></div>
    </div>

    <!-- Botón vaciar (visible solo si hay ítems) -->
    <div id="acciones-carrito" style="display:none;">
      <button id="btn-vaciar-carrito">🗑 Vaciar carrito</button>
    </div>
  </div>

  <!-- Columna derecha: resumen -->
  <aside id="resumen-carrito">
    <div class="resumen-header">
      <h2 class="resumen-title">Resumen</h2>
    </div>

    <div class="resumen-body">
      <div class="resumen-fila">
        <span class="resumen-fila__label">Productos</span>
        <span class="resumen-fila__valor" id="resumen-total-items">—</span>
      </div>
      <div class="resumen-fila">
        <span class="resumen-fila__label">Subtotal</span>
        <span class="resumen-fila__valor" id="resumen-total-precio">—</span>
      </div>
      <div class="resumen-fila">
        <span class="resumen-fila__label">IGV (18%)</span>
        <span class="resumen-fila__valor" id="resumen-igv">—</span>
      </div>
      <div class="resumen-divider"></div>
      <div class="resumen-fila resumen-fila--total">
        <span class="resumen-fila__label">Total</span>
        <span class="resumen-fila__valor" id="resumen-total-final">—</span>
      </div>
    </div>

    <div class="resumen-footer">
      <button id="btn-confirmar-compra">
        ✅ Confirmar compra
      </button>
    </div>
  </aside>

</div>

<div id="gc-toast-container"></div>

<script type="module">
  import { initCarrito } from "../assets/js/pages/carrito.page.js";
  initCarrito();
</script>

</body>
</html>

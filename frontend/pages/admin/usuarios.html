<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameCore — Usuarios</title>
  <link rel="stylesheet" href="../../assets/css/admin.css" />
</head>
<body>

<div class="gc-layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
  <aside class="gc-sidebar" id="gc-sidebar">

    <div class="gc-sidebar__brand">
      <div class="gc-sidebar__logo">🎮</div>
      <span class="gc-sidebar__brand-name">GameCore</span>
    </div>

    <nav class="gc-sidebar__nav">

      <span class="gc-nav-label">Principal</span>

      <a href="dashboard.html" class="gc-nav-link">
        <span class="gc-nav-link__icon">🏠</span>
        Dashboard
      </a>

      <span class="gc-nav-label">Catálogo</span>

      <a href="producto.html" class="gc-nav-link">
        <span class="gc-nav-link__icon">🎮</span>
        Productos
      </a>

      <a href="categorias.html" class="gc-nav-link">
        <span class="gc-nav-link__icon">🗂️</span>
        Categorías
      </a>

      <span class="gc-nav-label">Ventas</span>

      <a href="compras.html" class="gc-nav-link">
        <span class="gc-nav-link__icon">🧾</span>
        Compras
      </a>

      <span class="gc-nav-label">Usuarios</span>

      <a href="usuarios.html" class="gc-nav-link active">
        <span class="gc-nav-link__icon">👥</span>
        Usuarios
      </a>

      <span class="gc-nav-label">Tienda</span>

      <a href="../productos.html" class="gc-nav-link">
        <span class="gc-nav-link__icon">🛍️</span>
        Ver tienda
      </a>

    </nav>

    <div class="gc-sidebar__footer">
      <button class="gc-btn-logout" id="btn-logout">
        <span>🚪</span> Cerrar sesión
      </button>
    </div>

  </aside>

  <!-- ══ MAIN ═════════════════════════════════════════════════ -->
  <main class="gc-main">

    <header class="gc-topbar">
      <div class="gc-topbar__breadcrumb">
        <span>Admin</span>
        <span class="sep">›</span>
        <span>Usuarios</span>
        <span class="sep">›</span>
        <span class="active">Gestión</span>
      </div>
      <div class="gc-topbar__actions">
        <span class="gc-topbar__admin-tag" id="topbar-admin-name">Admin</span>
      </div>
    </header>

    <section class="gc-content">

      <div class="gc-page-header">
        <div>
          <h1 class="gc-page-title">Usuarios</h1>
          <p class="gc-page-subtitle">Administra los miembros registrados en GameCore</p>
        </div>
      </div>

      <div class="gc-card">
        <div class="gc-card__header">

          <!-- Filtros de rol — .btn-filtro-rol buscado por usuarios.js -->
          <div class="gc-filter-group">
            <button class="btn-filtro-rol activo" data-rol="todos">Todos</button>
            <button class="btn-filtro-rol" data-rol="admin">🛡️ Admin</button>
            <button class="btn-filtro-rol" data-rol="cliente">🛒 Cliente</button>
          </div>

          <div class="gc-search-box">
            <span class="gc-search-box__icon">🔍</span>
            <input type="text" class="gc-input-search"
                   id="input-busqueda-usuario" placeholder="Buscar usuario..." />
          </div>

        </div>

        <div class="gc-table-wrap">
          <table class="gc-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Registro</th>
                <th>Opciones</th>
              </tr>
            </thead>
            <tbody id="tabla-usuarios-body">
              <tr>
                <td colspan="6" style="text-align:center;color:var(--gc-text-muted);padding:36px;">
                  Cargando usuarios...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>

  </main>

</div>

<div id="gc-toast-container"></div>

<script type="module">
  import { initAdminUsuarios } from "../../assets/js/admin/usuarios.js";
  initAdminUsuarios();
</script>

</body>
</html>
